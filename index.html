<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatSourcing - AI Product Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
        .gradient-text { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen">
    <!-- API Configuration -->
    <script>
        // CHANGE THIS to your ngrok URL from Colab
        const API_BASE = "https://your-ngrok-url.ngrok.io";
    </script>

    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-pink-500 rounded-lg flex items-center justify-center">
                    <span class="text-2xl">🚀</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold gradient-text">BharatSourcing</h1>
                    <p class="text-xs text-gray-400">Powered by Gemini Pro • Running on Colab</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span class="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-sm border border-green-500/30">
                    ● Live
                </span>
                <a href="#" onclick="showDashboard()" class="text-sm text-gray-400 hover:text-white">Dashboard</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Search Section -->
        <div class="glass rounded-2xl p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6">🔍 Find Winning Products</h2>
            <div class="flex gap-4 mb-6">
                <input type="text" id="categoryInput" placeholder="Enter category (e.g., electronics, kitchen, toys)..." 
                    class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500">
                <button onclick="startScraping()" 
                    class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 px-8 py-3 rounded-lg font-semibold transition-all">
                    Analyze
                </button>
            </div>
            <div class="flex gap-2 flex-wrap">
                <span class="text-sm text-gray-400">Quick picks:</span>
                <button onclick="setCategory('wireless earbuds')" class="text-sm px-3 py-1 bg-gray-700 rounded-full hover:bg-gray-600">Wireless Earbuds</button>
                <button onclick="setCategory('kitchen organizer')" class="text-sm px-3 py-1 bg-gray-700 rounded-full hover:bg-gray-600">Kitchen Organizer</button>
                <button onclick="setCategory('phone stand')" class="text-sm px-3 py-1 bg-gray-700 rounded-full hover:bg-gray-600">Phone Stand</button>
                <button onclick="setCategory('beauty tools')" class="text-sm px-3 py-1 bg-gray-700 rounded-full hover:bg-gray-600">Beauty Tools</button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-12">
            <div class="inline-block w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-gray-400">AI is analyzing market opportunities...</p>
            <p class="text-sm text-gray-500 mt-2">This may take 30-60 seconds</p>
        </div>

        <!-- Results -->
        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- Opportunities Section -->
        <div class="mt-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold">💎 High Opportunity Products</h2>
                <button onclick="loadOpportunities()" class="text-purple-400 hover:text-purple-300 text-sm">Refresh</button>
            </div>
            <div id="opportunities" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <!-- JavaScript -->
    <script>
        function setCategory(cat) {
            document.getElementById('categoryInput').value = cat;
        }

        async function startScraping() {
            const category = document.getElementById('categoryInput').value;
            if (!category) return alert('Enter a category!');

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/scrape/${category}?pages=1`);
                const data = await response.json();

                document.getElementById('loading').classList.add('hidden');

                if (!data.success) {
                    alert('Error: ' + data.error);
                    return;
                }

                displayResults(data.products);
                loadOpportunities(); // Refresh opportunities
            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                alert('Failed to connect. Make sure Colab is running!');
            }
        }

        function displayResults(products) {
            const container = document.getElementById('results');
            
            products.forEach(product => {
                const swot = product.swot || {};
                const score = product.market_score || 0;
                const scoreColor = score >= 80 ? 'text-green-400' : score >= 60 ? 'text-yellow-400' : 'text-red-400';
                
                const card = document.createElement('div');
                card.className = 'glass rounded-xl p-6 hover:border-purple-500/50 transition-all';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs text-gray-400 uppercase tracking-wider">${product.category}</span>
                            <h3 class="font-bold text-lg mt-1 line-clamp-2">${product.title}</h3>
                            <p class="text-sm text-gray-400">${product.brand}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold ${scoreColor}">${score}</div>
                            <div class="text-xs text-gray-500">Score</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                        <div class="bg-gray-800/50 rounded p-2">
                            <span class="text-gray-400">Price</span>
                            <div class="font-semibold">₹${product.price}</div>
                        </div>
                        <div class="bg-gray-800/50 rounded p-2">
                            <span class="text-gray-400">Rating</span>
                            <div class="font-semibold">⭐ ${product.rating}</div>
                        </div>
                    </div>

                    <div class="space-y-2 mb-4">
                        <div class="text-xs">
                            <span class="text-green-400 font-semibold">Strengths:</span>
                            <span class="text-gray-300">${(swot.strengths || []).slice(0,2).join(', ')}</span>
                        </div>
                        <div class="text-xs">
                            <span class="text-yellow-400 font-semibold">Opportunities:</span>
                            <span class="text-gray-300">${(swot.opportunities || []).slice(0,2).join(', ')}</span>
                        </div>
                    </div>

                    <button onclick="viewStrategy(${product.id})" 
                        class="w-full bg-purple-600/20 border border-purple-500/30 text-purple-300 py-2 rounded-lg hover:bg-purple-600/30 transition-all text-sm">
                        View Strategy →
                    </button>
                `;
                container.appendChild(card);
            });
        }

        async function loadOpportunities() {
            try {
                const response = await fetch(`${API_BASE}/opportunities?min_score=70`);
                const data = await response.json();
                
                const container = document.getElementById('opportunities');
                container.innerHTML = '';

                data.products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'glass rounded-xl p-4 border-l-4 border-green-500';
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <h4 class="font-semibold line-clamp-1">${product.title}</h4>
                                <p class="text-sm text-gray-400 mt-1">Score: ${product.market_score} • ₹${product.price}</p>
                            </div>
                            <a href="${product.url}" target="_blank" class="text-purple-400 hover:text-purple-300 ml-2">↗</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load opportunities');
            }
        }

        async function viewStrategy(productId) {
            alert('Strategy view - Add modal here to show detailed strategy from /strategy/' + productId);
        }

        function showDashboard() {
            window.open(`${API_BASE}/dashboard`, '_blank');
        }

        // Load opportunities on start
        loadOpportunities();
    </script>
</body>
</html>
